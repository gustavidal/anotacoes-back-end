components:
  schemas:
    Atividade:
      required:
        - id
        - area_atuacao
      type: object
      properties:
        id:
          type: integer
        area_atuacao:
          type: string
          description: O número máximo de caracteres é de 40

    Classificacao:
      required:
        - id
        - classificacao
      type: object
      properties:
        id:
          type: integer
        classificacao:
          type: string
          example: "+12"
          description: O número máximo de caracteres é de 5; Em caso de "Livre", se guarda a letra "L"
        descricao:
          type: string
          description: O número máximo de caracteres é ilimitado
        idade_minima:
          type: integer

    Filme:
      required:
        - id
        - nome
        - sinopse
        - data_lancamento
        - capa
        - duracao
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
          description: O número máximo de caracteres é de 80
        sinopse:
          type: string
          description: O número máximo de caracteres é ilimitado
        data_lancamento:
          type: string
          format: date
          example: "2026-01-01"
        capa:
          type: string
          description: O número máximo de caracteres é de 255
        duracao:
          type: string
          example: "01:45"
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
        valor:
          type: number
          format: double
          example: "999.99"
          description: O número máximo de caracteres é de 9 centenas, 9 dezenas e 9 unidades (999) e duas casas decimais (.99)
        avaliacao:
          type: number
          format: double
          example: "5.0"
          description: O número máximo de caracteres é de 5 unidades (5) e 1 casa decimal (.9), porém tendo como valor máximo 5.0

    Foto:
      required:
        - id
        - foto
      type: object
      properties:
        id:
          type: integer
        foto:
          type: string
          example: "https://fotos.com/foto_do_ator"
          description: O número máximo de caracteres é de 255
    
    Genero:
      required:
        - id
        - genero
      type: object
      properties:
        id:
          type: integer
        genero:
          type: string
          description: O número máximo de caracteres é de 30

    Nacionalidade:
      required:
        - id
        - nacionalidade
      type: object
      properties:
        id:
          type: integer
        nacionalidade:
          type: string
          example: "Papua-nova-guineense"
          description: O número máximo de caracteres é de 25
    
    Sexo:
      required:
        - id
